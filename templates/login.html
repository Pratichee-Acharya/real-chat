<!DOCTYPE html>
<html>
<head>
<title>Login </title>

<style>

body {
background: linear-gradient(to right, #ffe4ec, #ffc0cb);
font-family: "Comic Sans MS", cursive;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: white;
padding: 30px;
border-radius: 20px;
box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
text-align: center;
width: 300px;
}

h2 {
color: #ff1493;
}

input {
width: 90%;
padding: 10px;
margin: 10px 0;
border-radius: 10px;
border: 1px solid #ffb6c1;
outline: none;
}

button {
width: 95%;
padding: 10px;
background: #ff69b4;
color: white;
border: none;
border-radius: 10px;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #ff1493;
}

a {
color: #ff1493;
text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

<h2> Login </h2>

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button type="submit">Login</button>
</form>

<p>New user? <a href="/signup">Create account 🌸</a></p>

</div>

</body>
</html>
