<!DOCTYPE html>
<html>

<head>
<title> Chat </title>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>

body {
font-family: "Comic Sans MS", cursive;

/* Background image */
background: url("static/bg2.jpg");

/* Make it look nice */
background-size: cover;
background-position: center;
background-repeat: no-repeat;

display: flex;
justify-content: center;
margin-top: 40px;
}

#container {
display: flex;
width: 800px;

/* Glass effect */
background: rgba(255, 255, 255, 0.6);
backdrop-filter: blur(8px);
padding: 15px;
border-radius: 20px;
}

#chatbox {
flex: 3;
background: #fff0f5;
height: 400px;
overflow-y: auto;
padding: 10px;
border-radius: 15px;
box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
}

#users {
flex: 1;
background: #fff0f5;
margin-left: 10px;
padding: 10px;
border-radius: 15px;
box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
}

.message {
padding: 8px 12px;
margin: 6px;
border-radius: 15px;
max-width: 70%;
font-size: 14px;
}

.me {
background: #ff69b4;
color: white;
margin-left: auto;
}

.other {
background: #ffb6c1;
}

.system {
background: #b7cbdb;
text-align: center;
font-style: italic;
}

h3, h4 {
color: #ff1493;
}

#inputArea {
margin-top: 10px;
}

input {
padding: 10px;
width: 70%;
border-radius: 10px;
border: 1px solid #ffb6c1;
outline: none;
}

button {
padding: 10px 15px;
background: #ff69b4;
color: white;
border: none;
border-radius: 10px;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #ff1493;
}

li {
color: #ff1493;
margin: 5px 0;
}

</style>

</head>

<body>

<div id="container">

<div>

<h3> Chat Room </h3>
<button onclick="exitChat()"> Exit Chat </button>
<div id="chatbox"></div>

<div id="inputArea">
<input id="msg" placeholder="Type something cute..." onkeydown="handleKey(event)">
<button onclick="send()"> Send 💖 </button>
</div>

</div>

<div id="users">
<h4> Online </h4>
<ul id="userlist"></ul>
</div>

</div>

<script>

var socket = io()

socket.emit("join")

socket.on("message", function(data){

var div = document.createElement("div")
div.classList.add("message")

if(data.user === "System"){
    div.classList.add("system")
}
else if(data.user === username){
    div.classList.add("me")
}
else{
    div.classList.add("other")
}

div.innerText = `[${data.time}] ${data.user}: ${data.msg}`

document.getElementById("chatbox").appendChild(div)

document.getElementById("chatbox").scrollTop =
document.getElementById("chatbox").scrollHeight

})

socket.on("users", function(users){

var list = document.getElementById("userlist")
list.innerHTML=""

users.forEach(function(user){
var li = document.createElement("li")
li.innerText = " " + user
list.appendChild(li)
})

})

function send(){

var message = document.getElementById("msg").value

if(message.trim() === "") return

socket.send({
"user": username,
"msg": message
})

document.getElementById("msg").value=""

}

function exitChat(){
    socket.disconnect();
    alert("You left the chat ");
    location.reload();
}

function handleKey(event){
if(event.key === "Enter"){
send()
}
}

</script>

</body>

</html>
